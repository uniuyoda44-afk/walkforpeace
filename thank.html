<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Walk for Peace — Thank You for Registering</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Open Sans',sans-serif;overflow:hidden;}
a{text-decoration:none;color:inherit;}button{cursor:pointer;font-family:inherit;}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:54px;background:#fff;border-bottom:1px solid #e0e6ef;box-shadow:0 1px 8px rgba(0,0,0,.07);display:flex;align-items:center;padding:0 2rem;}
.nav-logo{display:flex;align-items:center;gap:.45rem;flex-shrink:0;margin-right:auto;}
.nav-logo-icon{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#5BA3D9,#1B56E8);display:flex;align-items:center;justify-content:center;font-size:.85rem;}
.nav-logo-text{font-family:'Merriweather',serif;font-size:.95rem;color:#1a1a1a;}
.nav-logo-text em{font-style:italic;color:#1B56E8;}
.nav-links{display:flex;align-items:center;gap:1.6rem;list-style:none;margin-right:1.2rem;}
.nav-links a{font-size:.8rem;color:#555;text-decoration:none;}
.nav-links a:hover{color:#1B56E8;}
.nav-btn{background:#1B56E8;color:#fff;border:none;border-radius:4px;padding:.38rem 1.05rem;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;}

/* ── FULL PAGE: monks walking photo + centered white text ── */
/* Prototype: monks marching away from viewer (backs visible), white fluffy dog, flag bearer
   Text says: "Thank You for Registering!" bold white, small sub "We'll be in touch..." */
.page{
  position:relative;height:100vh;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.bg{
  position:absolute;inset:0;
  /* Monks walking away, back view, nature path */
  background:url('images/thank_register.jpg') center 60%/cover;
  filter:brightness(.5);
}
/* Sky blue tint overlay like prototype */
.bg-tint{
  position:absolute;inset:0;
  background:linear-gradient(180deg,
    rgba(120,185,240,.35) 0%,
    rgba(80,150,220,.2) 40%,
    rgba(40,100,180,.15) 100%
  );
}
/* Flag/banner decorations */
.dove-lt{position:absolute;top:16%;left:10%;font-size:2rem;opacity:.4;animation:dv 5s ease-in-out infinite;}
.dove-rt{position:absolute;top:12%;right:12%;font-size:2.4rem;opacity:.35;animation:dv 4.5s 1s ease-in-out infinite;}
@keyframes dv{0%,100%{transform:translateY(0)rotate(-5deg)}50%{transform:translateY(-16px)rotate(5deg)}}

.content{
  position:relative;z-index:2;
  text-align:center;padding:2rem 3rem;
  max-width:560px;
  animation:up .75s ease both;
}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.content h1{
  font-family:'Merriweather',serif;
  font-size:clamp(2.2rem,5vw,3.4rem);
  color:#fff;font-weight:700;line-height:1.2;
  text-shadow:0 2px 18px rgba(0,0,0,.45);
  margin-bottom:1rem;
}
.content p{
  font-size:1rem;color:rgba(255,255,255,.88);
  line-height:1.65;
  text-shadow:0 1px 8px rgba(0,0,0,.3);
  margin-bottom:2rem;
}
.btns{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap;}
.btn-w{
  background:#fff;color:#1340A0;border:none;border-radius:5px;
  padding:.65rem 1.6rem;font-size:.85rem;font-weight:700;cursor:pointer;
  transition:all .2s;font-family:'Open Sans',sans-serif;
}
.btn-w:hover{background:#EEF4FF;transform:translateY(-1px);}
.btn-y{
  background:#F5A721;color:#fff;border:none;border-radius:5px;
  padding:.65rem 1.6rem;font-size:.85rem;font-weight:700;cursor:pointer;
  transition:all .2s;font-family:'Open Sans',sans-serif;
}
.btn-y:hover{background:#D99010;transform:translateY(-1px);}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">🕊</div>
    <span class="nav-logo-text">Walk <em>for</em> Peace</span>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="events.html">Events</a></li>
    <li><a href="donate.html">Donate</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <button class="nav-btn" onclick="location.href='join.html'">Join the Walk</button>
</nav>

<div class="page">
  <div class="bg"></div>
  <div class="bg-tint"></div>
  <div class="dove-lt">🕊️</div>
  <div class="dove-rt">🕊️</div>

  <div class="content">
    <h1>Thank You for Registering!</h1>
    <p>We'll be in touch with more details soon. Welcome to the Walk for Peace community — together we walk toward a more compassionate world.</p>
    <div class="btns">
      <button class="btn-w" onclick="location.href='index.html'">Back to Home</button>
      <button class="btn-y" onclick="location.href='donate.html'">Make a Donation</button>
    </div>
  </div>
</div>

</body>
</html>
